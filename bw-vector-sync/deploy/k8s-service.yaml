apiVersion: v1
kind: Service
metadata:
  name: bw-vector-sync
  namespace: brillian-world
  labels:
    app: bw-vector-sync
spec:
  type: ClusterIP
  selector:
    app: bw-vector-sync
  ports:
    - name: health
      port: 8080
      targetPort: 8080
    - name: metrics
      port: 9100
      targetPort: 9100
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: bw-vector-sync
  namespace: brillian-world
  labels:
    app: bw-vector-sync
spec:
  selector:
    matchLabels:
      app: bw-vector-sync
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
